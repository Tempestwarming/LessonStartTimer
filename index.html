<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A classroom Do Now display with learning question, activity instructions, dictation, and timer controls."
    />
    <title>Do Now App</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <div class="app-frame">
        <header class="date-time-bar" id="dateTimeBar" aria-live="polite">
          Tuesday the 14th of April 2026 - 09:00
        </header>

        <main class="main-layout" aria-label="Do Now content">
          <section class="panel">
            <div class="field">
              <div class="field-top">
                <label for="learningQuestion">Learning Question</label>
                <button class="dictate-button" id="dictateQuestionButton" type="button">
                  Dictate
                </button>
              </div>
              <textarea
                id="learningQuestion"
                placeholder="Type the learning question here"
                aria-label="Learning question"
                spellcheck="true"
              ></textarea>
            </div>
          </section>

          <section class="panel">
            <div class="field">
              <div class="field-top">
                <label for="activityInstructions">Activity Instructions</label>
                <button class="dictate-button" id="dictateActivityButton" type="button">
                  Dictate
                </button>
              </div>
              <textarea
                id="activityInstructions"
                placeholder="Type the do now task or activity instructions here"
                aria-label="Activity instructions"
                spellcheck="true"
              ></textarea>
            </div>
          </section>
        </main>

        <aside class="timer-bar" aria-label="Timer progress">
          <div class="timer-bar__fill" id="timerBarFill"></div>
          <div class="timer-bar__glass"></div>
        </aside>

        <section class="timer-panel" aria-label="Timer controls">
          <div class="timer-display-wrap" id="timerDisplayWrap">
            <p class="timer-label">Time Remaining</p>
            <output class="timer-display" id="timerDisplay" aria-live="polite">05:00</output>
          </div>

          <div class="timer-controls">
            <div class="minutes-field">
              <label for="minutesInput">Minutes</label>
              <input
                type="number"
                id="minutesInput"
                min="1"
                max="120"
                value="5"
                inputmode="numeric"
                aria-describedby="timerStatus"
              />
            </div>

            <div class="preset-row" aria-label="Timer presets">
              <button class="button button--secondary preset-btn" data-minutes="1" type="button">1m</button>
              <button class="button button--secondary preset-btn" data-minutes="2" type="button">2m</button>
              <button class="button button--secondary preset-btn" data-minutes="5" type="button">5m</button>
              <button class="button button--secondary preset-btn" data-minutes="10" type="button">10m</button>
              <button class="button button--secondary preset-btn" data-minutes="15" type="button">15m</button>
            </div>

            <div class="control-row">
              <button class="button" id="startTimer" type="button">Start</button>
              <button class="button button--secondary" id="pauseTimer" type="button">Pause</button>
              <button class="button button--secondary" id="resetTimer" type="button">Reset</button>
              <button class="button button--danger" id="stopBeep" type="button">Stop</button>
            </div>
          </div>

          <p class="status-box" id="timerStatus" aria-live="polite">
            Timer is ready. Set the minutes and press start.
          </p>
        </section>

        <footer class="shortcut-panel" aria-label="Desktop keyboard shortcuts">
          <p class="shortcut-title">Desktop Shortcuts</p>
          <div class="shortcut-bar">
            <div class="shortcut-item"><kbd>Space</kbd><span>Start / Pause</span></div>
            <div class="shortcut-item"><kbd>R</kbd><span>Reset timer</span></div>
            <div class="shortcut-item"><kbd>1</kbd><span>1 min</span></div>
            <div class="shortcut-item"><kbd>2</kbd><span>2 mins</span></div>
            <div class="shortcut-item"><kbd>5</kbd><span>5 mins</span></div>
            <div class="shortcut-item"><kbd>F</kbd><span>Full screen</span></div>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
