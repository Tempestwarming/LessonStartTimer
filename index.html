<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Do Now App</title>
  <style>
    :root {
      --panel: #f8f7f1;
      --text: #111111;
      --muted: #3d4b4a;
      --border-dark: rgba(0, 0, 0, 0.14);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.16);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Verdana, "Trebuchet MS", sans-serif;
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 10px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(91, 211, 219, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(39, 142, 214, 0.14), transparent 35%),
        linear-gradient(135deg, #d8f3f1 0%, #e7f7ff 38%, #eadfff 68%, #ffe3f1 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -18%;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: screen;
    }

    body::before {
      background:
        radial-gradient(circle at 16% 24%, rgba(88, 224, 215, 0.44) 0%, rgba(88, 224, 215, 0.18) 12%, transparent 28%),
        radial-gradient(circle at 76% 26%, rgba(84, 196, 255, 0.38) 0%, rgba(84, 196, 255, 0.14) 14%, transparent 30%),
        radial-gradient(circle at 48% 76%, rgba(183, 143, 255, 0.34) 0%, rgba(183, 143, 255, 0.12) 14%, transparent 30%),
        radial-gradient(circle at 82% 72%, rgba(255, 148, 207, 0.28) 0%, rgba(255, 148, 207, 0.10) 12%, transparent 26%);
      animation: rippleDriftOne 9s ease-in-out infinite alternate;
      filter: blur(26px);
      opacity: 0.9;
    }

    body::after {
      background:
        radial-gradient(circle at 24% 72%, rgba(92, 231, 215, 0.28) 0%, rgba(92, 231, 215, 0.10) 12%, transparent 26%),
        radial-gradient(circle at 68% 16%, rgba(170, 139, 255, 0.26) 0%, rgba(170, 139, 255, 0.10) 12%, transparent 26%),
        radial-gradient(circle at 58% 58%, rgba(255, 171, 220, 0.24) 0%, rgba(255, 171, 220, 0.08) 12%, transparent 24%),
        radial-gradient(circle at 90% 44%, rgba(82, 180, 255, 0.24) 0%, rgba(82, 180, 255, 0.08) 12%, transparent 24%);
      animation: rippleDriftTwo 11s ease-in-out infinite alternate;
      filter: blur(42px);
      opacity: 0.8;
    }

    .app-shell {
      width: min(1500px, 100%);
      min-height: calc(100vh - 20px);
      border-radius: 30px;
      padding: 4px;
      background: linear-gradient(
        120deg,
        #36c7d8,
        #56e0d0,
        #4ca9ff,
        #8f8dff,
        #ff9bd1,
        #54d6e6,
        #36c7d8
      );
      background-size: 400% 400%;
      animation: shimmerFlow 7s linear infinite;
      box-shadow: 0 24px 60px rgba(14, 84, 110, 0.22);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 18%,
        rgba(255, 255, 255, 0.40) 34%,
        transparent 50%
      );
      transform: translateX(-120%);
      animation: shimmerSweep 4.2s ease-in-out infinite;
      pointer-events: none;
    }

    .app-frame {
      position: relative;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-radius: 26px;
      padding: 16px;
      min-height: calc(100vh - 28px);
      display: grid;
      grid-template-columns: 1fr 52px;
      grid-template-rows: auto 1fr auto auto;
      gap: 14px 14px;
    }

    .date-time-bar {
      grid-column: 1;
      grid-row: 1;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 20px;
      padding: 16px 22px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #111111;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .main-layout {
      grid-column: 1;
      grid-row: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      min-height: 0;
      align-items: stretch;
    }

    .panel {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .field {
      margin-bottom: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .field-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 1.45rem;
      font-weight: 800;
      margin: 0;
    }

    .dictate-small {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      min-width: 112px;
      min-height: 44px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #54d6e6, #2f9fd2);
      color: #0c1b21;
      box-shadow: 0 10px 24px rgba(41, 137, 175, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dictate-small:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(41, 137, 175, 0.32);
      filter: brightness(1.03);
    }

    .dictate-small:active {
      transform: translateY(0);
    }

    .dictate-small[disabled] {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    textarea,
    input[type="number"] {
      width: 100%;
      border: 2px solid rgba(0, 0, 0, 0.16);
      border-radius: 16px;
      background: var(--panel);
      color: var(--text);
      padding: 16px 18px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea:focus,
    input[type="number"]:focus {
      border-color: #2aa7d7;
      box-shadow: 0 0 0 4px rgba(42, 167, 215, 0.16);
    }

    textarea {
      resize: none;
      overflow: hidden;
      display: block;
      height: 100%;
      min-height: 100%;
    }

    #learningQuestion {
      font-size: 2.45rem;
      font-weight: 700;
      line-height: 1.24;
    }

    #activityInstructions {
      font-size: 2.15rem;
      line-height: 1.42;
    }

    #learningQuestion::placeholder,
    #activityInstructions::placeholder {
      font-size: 1.5rem;
    }

    .timer-bar-outer {
      grid-column: 2;
      grid-row: 1 / 5;
      position: relative;
      border-radius: 22px;
      border: 2px solid rgba(0, 0, 0, 0.14);
      background: rgba(248, 247, 241, 0.9);
      overflow: hidden;
      min-height: 100%;
      height: 100%;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    .timer-bar-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      background: linear-gradient(
        180deg,
        #79e5d9 0%,
        #58d2df 35%,
        #39b8df 65%,
        #2b98d4 100%
      );
      transition: height 0.35s linear;
    }

    .timer-bar-fill.warning {
      background: linear-gradient(
        180deg,
        #ffe38a 0%,
        #ffc85a 50%,
        #ff9f43 100%
      );
    }

    .timer-bar-fill.danger {
      background: linear-gradient(
        180deg,
        #ffb3a8 0%,
        #ff7d73 55%,
        #f04f4f 100%
      );
    }

    .timer-bar-glass {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.24) 0%,
        rgba(255, 255, 255, 0.08) 25%,
        rgba(255, 255, 255, 0.02) 55%,
        rgba(0, 0, 0, 0.04) 100%
      );
      pointer-events: none;
    }

    .bottom-timer-panel {
      grid-column: 1;
      grid-row: 3;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1.2fr 1.4fr 1fr;
      gap: 16px;
      align-items: center;
    }

    .timer-display-wrap {
      background: var(--panel);
      border: 2px solid rgba(0, 0, 0, 0.14);
      border-radius: 22px;
      padding: 18px 22px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .timer-display-wrap.warning-flash {
      animation: lastThirtyFlash 0.85s ease-in-out infinite;
    }

    .timer-label {
      font-size: 0.98rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .timer-display {
      font-size: clamp(3.2rem, 7vw, 5.9rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .timer-middle {
      display: grid;
      gap: 12px;
      align-content: center;
    }

    .preset-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }

    .button,
    .timer-button {
      border: none;
      border-radius: 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
      padding: 14px 18px;
      background: linear-gradient(135deg, #54d6e6, #2f9fd2);
      color: #0c1b21;
      box-shadow: 0 10px 24px rgba(41, 137, 175, 0.28);
      width: 100%;
      min-height: 56px;
    }

    .button:hover,
    .timer-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(41, 137, 175, 0.34);
      filter: brightness(1.03);
    }

    .button:active,
    .timer-button:active {
      transform: translateY(0);
    }

    .button[disabled],
    .timer-button[disabled] {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .secondary {
      background: linear-gradient(135deg, #cfeef1, #9edbe8);
    }

    .danger {
      background: linear-gradient(135deg, #e15a5a, #b4202f, #7f1321);
      color: #ffffff;
    }

    .status-box {
      background: rgba(248, 247, 241, 0.95);
      border: 2px dashed rgba(0, 0, 0, 0.15);
      border-radius: 18px;
      padding: 10px 12px;
      line-height: 1.2;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .shortcut-bar {
      grid-column: 1;
      grid-row: 4;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .shortcut-item {
      background: rgba(248, 247, 241, 0.95);
      border: 2px dashed rgba(0, 0, 0, 0.12);
      border-radius: 16px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      min-height: 58px;
      font-size: 0.92rem;
    }

    .kbd {
      min-width: 34px;
      text-align: center;
      padding: 4px 8px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.15);
      box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08);
      font-weight: 700;
      flex-shrink: 0;
    }

    .flash {
      animation: pulseAlert 0.9s ease-in-out 3;
    }

    @keyframes shimmerFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shimmerSweep {
      0% { transform: translateX(-120%); }
      55% { transform: translateX(120%); }
      100% { transform: translateX(120%); }
    }

    @keyframes rippleDriftOne {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      25% { transform: translate3d(3%, -2%, 0) scale(1.06); }
      50% { transform: translate3d(-2%, 3%, 0) scale(1.1); }
      75% { transform: translate3d(2%, 2%, 0) scale(1.05); }
      100% { transform: translate3d(-3%, -2%, 0) scale(1.08); }
    }

    @keyframes rippleDriftTwo {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      25% { transform: translate3d(-3%, 2%, 0) scale(1.08); }
      50% { transform: translate3d(2%, -3%, 0) scale(1.12); }
      75% { transform: translate3d(-2%, -1%, 0) scale(1.06); }
      100% { transform: translate3d(3%, 2%, 0) scale(1.1); }
    }

    @keyframes pulseAlert {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes lastThirtyFlash {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 128, 128, 0.00);
        background: rgba(248, 247, 241, 1);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(255, 128, 128, 0.16);
        background: rgba(255, 239, 239, 1);
      }
    }

    @media (max-width: 1250px) {
      .bottom-timer-panel {
        grid-template-columns: 1fr;
      }

      .shortcut-bar {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 1000px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .app-frame {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr auto auto;
      }

      .date-time-bar {
        grid-column: 1;
        grid-row: 1;
      }

      .main-layout {
        grid-column: 1;
        grid-row: 2;
      }

      .timer-bar-outer {
        grid-column: 1;
        grid-row: 3;
        min-height: 160px;
      }

      .bottom-timer-panel {
        grid-column: 1;
        grid-row: 4;
      }

      .shortcut-bar {
        grid-column: 1;
        grid-row: 5;
      }
    }

    @media (max-width: 800px) {
      body {
        padding: 8px;
      }

      .question-row,
      .activity-row {
        grid-template-columns: 1fr;
      }

      .preset-row {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .control-row {
        grid-template-columns: 1fr 1fr;
      }

      .shortcut-bar {
        grid-template-columns: 1fr 1fr;
      }

      #learningQuestion {
        font-size: 1.9rem;
      }

      #activityInstructions {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">
      <div class="date-time-bar" id="dateTimeBar">Tuesday the 14th of April 2026 • 09:00</div>

      <main class="main-layout">
        <section class="panel">
          <div class="field">
            <div class="field-top">
              <label for="learningQuestion">Learning Question</label>
              <button class="dictate-small" id="dictateQuestionButton" type="button">🎤 Dictate</button>
            </div>
            <textarea
              id="learningQuestion"
              placeholder="Type the learning question here"
              aria-label="Learning question"
            ></textarea>
          </div>
        </section>

        <section class="panel">
          <div class="field">
            <div class="field-top">
              <label for="activityInstructions">Activity Instructions</label>
              <button class="dictate-small" id="dictateActivityButton" type="button">🎤 Dictate</button>
            </div>
            <textarea
              id="activityInstructions"
              placeholder="Type the do now task or activity instructions here"
              aria-label="Activity instructions"
            ></textarea>
          </div>
        </section>
      </main>

      <aside class="timer-bar-outer" aria-hidden="true">
        <div class="timer-bar-fill" id="timerBarFill"></div>
        <div class="timer-bar-glass"></div>
      </aside>

      <section class="bottom-timer-panel">
        <div class="timer-display-wrap" id="timerDisplayWrap">
          <div class="timer-label">Time Remaining</div>
          <div class="timer-display" id="timerDisplay">05:00</div>
        </div>

        <div class="timer-middle">
          <div>
            <label for="minutesInput">Minutes</label>
            <input
              type="number"
              id="minutesInput"
              min="1"
              max="120"
              value="5"
              aria-label="Timer minutes"
            />
          </div>

          <div class="preset-row">
            <button class="button secondary preset-btn" data-minutes="1" type="button">1m</button>
            <button class="button secondary preset-btn" data-minutes="2" type="button">2m</button>
            <button class="button secondary preset-btn" data-minutes="5" type="button">5m</button>
            <button class="button secondary preset-btn" data-minutes="10" type="button">10m</button>
            <button class="button secondary preset-btn" data-minutes="15" type="button">15m</button>
          </div>

          <div class="control-row">
            <button class="timer-button" id="startTimer" type="button">Start</button>
            <button class="timer-button secondary" id="pauseTimer" type="button">Pause</button>
            <button class="timer-button secondary" id="resetTimer" type="button">Reset</button>
            <button class="timer-button danger" id="stopBeep" type="button">Stop</button>
          </div>
        </div>

        <div class="status-box" id="timerStatus">
          Timer is ready. Set the minutes and press start.
        </div>
      </section>

      <div class="shortcut-bar">
        <div class="shortcut-item"><span class="kbd">Space</span><span>Start / Pause</span></div>
        <div class="shortcut-item"><span class="kbd">R</span><span>Reset timer</span></div>
        <div class="shortcut-item"><span class="kbd">1</span><span>1 min</span></div>
        <div class="shortcut-item"><span class="kbd">2</span><span>2 mins</span></div>
        <div class="shortcut-item"><span class="kbd">5</span><span>5 mins</span></div>
        <div class="shortcut-item"><span class="kbd">F</span><span>Full screen</span></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "do_now_app_state_v6";

    const learningQuestion = document.getElementById('learningQuestion');
    const activityInstructions = document.getElementById('activityInstructions');

    const dictateQuestionButton = document.getElementById('dictateQuestionButton');
    const dictateActivityButton = document.getElementById('dictateActivityButton');

    const minutesInput = document.getElementById('minutesInput');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerDisplayWrap = document.getElementById('timerDisplayWrap');
    const timerStatus = document.getElementById('timerStatus');
    const timerBarFill = document.getElementById('timerBarFill');

    const startTimerButton = document.getElementById('startTimer');
    const pauseTimerButton = document.getElementById('pauseTimer');
    const resetTimerButton = document.getElementById('resetTimer');
    const stopBeepButton = document.getElementById('stopBeep');

    const dateTimeBar = document.getElementById('dateTimeBar');
    const presetButtons = document.querySelectorAll('.preset-btn');

    let totalSeconds = parseInt(minutesInput.value, 10) * 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;
    let audioContext = null;
    let beepInterval = null;
    let oneMinuteWarningPlayed = false;
    let lastTenSecondPlayed = new Set();

    function saveState() {
      const state = {
        learningQuestion: learningQuestion.value,
        activityInstructions: activityInstructions.value,
        minutesInput: minutesInput.value,
        remainingSeconds,
        totalSeconds
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);

        if (typeof state.learningQuestion === 'string') learningQuestion.value = state.learningQuestion;
        if (typeof state.activityInstructions === 'string') activityInstructions.value = state.activityInstructions;
        if (typeof state.minutesInput !== 'undefined') minutesInput.value = state.minutesInput;
        if (typeof state.totalSeconds === 'number' && state.totalSeconds > 0) totalSeconds = state.totalSeconds;
        if (typeof state.remainingSeconds === 'number' && state.remainingSeconds >= 0) remainingSeconds = state.remainingSeconds;
      } catch (error) {}
    }

    function getOrdinal(day) {
      if (day > 3 && day < 21) return 'th';
      switch (day % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    }

    function updateDateTime() {
      const now = new Date();
      const weekday = now.toLocaleDateString('en-GB', { weekday: 'long' });
      const month = now.toLocaleDateString('en-GB', { month: 'long' });
      const year = now.getFullYear();
      const day = now.getDate();
      const time = now.toLocaleTimeString('en-GB', {
        hour: '2-digit',
        minute: '2-digit'
      });

      dateTimeBar.textContent = `${weekday} the ${day}${getOrdinal(day)} of ${month} ${year} • ${time}`;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
    }

    function updateTimerBar() {
      const ratio = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;
      const percentage = Math.max(0, Math.min(100, ratio * 100));
      timerBarFill.style.height = `${percentage}%`;

      timerBarFill.classList.remove('warning', 'danger');
      if (percentage <= 25) {
        timerBarFill.classList.add('danger');
      } else if (percentage <= 50) {
        timerBarFill.classList.add('warning');
      }
    }

    function updateLastThirtyWarning() {
      if (isRunning && remainingSeconds <= 30 && remainingSeconds > 0) {
        timerDisplayWrap.classList.add('warning-flash');
      } else {
        timerDisplayWrap.classList.remove('warning-flash');
      }
    }

    function syncTimerFromInput() {
      const minutes = Math.max(1, Math.min(120, parseInt(minutesInput.value, 10) || 5));
      minutesInput.value = minutes;
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      oneMinuteWarningPlayed = false;
      lastTenSecondPlayed.clear();
      updateDisplay();
      updateTimerBar();
      updateLastThirtyWarning();
      timerStatus.textContent = `Timer set for ${minutes} minute${minutes === 1 ? '' : 's'}.`;
      timerDisplayWrap.classList.remove('flash');
      saveState();
    }

    function stopTimerInterval() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      isRunning = false;
      updateLastThirtyWarning();
    }

    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
    }

    function playTone(frequency, duration, volume = 0.18, type = 'sine') {
      ensureAudioContext();

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
      gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(volume, audioContext.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + duration + 0.02);
    }

    function playOneMinuteWarning() {
      playTone(740, 0.18, 0.12, 'triangle');
      setTimeout(() => playTone(740, 0.18, 0.12, 'triangle'), 260);
    }

    function playLastTenTick() {
      playTone(980, 0.08, 0.10, 'square');
    }

    function createEndAlarmBeep() {
      playTone(880, 0.24, 0.2, 'sine');
    }

    function startBeeping() {
      stopBeeping();
      createEndAlarmBeep();
      beepInterval = setInterval(createEndAlarmBeep, 900);
    }

    function stopBeeping() {
      if (beepInterval) {
        clearInterval(beepInterval);
        beepInterval = null;
      }
    }

    function startTimer() {
      if (isRunning) return;

      if (remainingSeconds <= 0) {
        syncTimerFromInput();
      }

      stopBeeping();
      isRunning = true;
      timerStatus.textContent = 'Timer is running.';
      updateLastThirtyWarning();
      saveState();

      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds -= 1;
          updateDisplay();
          updateTimerBar();
          updateLastThirtyWarning();

          if (remainingSeconds === 60 && !oneMinuteWarningPlayed) {
            playOneMinuteWarning();
            oneMinuteWarningPlayed = true;
            timerStatus.textContent = 'One minute remaining.';
          }

          if (remainingSeconds <= 10 && remainingSeconds > 0 && !lastTenSecondPlayed.has(remainingSeconds)) {
            playLastTenTick();
            lastTenSecondPlayed.add(remainingSeconds);
          }

          saveState();
        }

        if (remainingSeconds <= 0) {
          stopTimerInterval();
          timerStatus.textContent = 'Time is up.';
          timerDisplayWrap.classList.add('flash');
          updateTimerBar();
          updateLastThirtyWarning();
          startBeeping();
          saveState();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      stopTimerInterval();
      timerStatus.textContent = 'Timer paused.';
      saveState();
    }

    function resetTimer() {
      stopTimerInterval();
      stopBeeping();
      syncTimerFromInput();
      timerStatus.textContent = 'Timer reset.';
      saveState();
    }

    async function enterFullScreen() {
      if (!document.fullscreenElement) {
        try {
          await document.documentElement.requestFullscreen();
        } catch (error) {
          timerStatus.textContent = 'Full screen was blocked by the browser.';
        }
      }
    }

    function getQuestionConfig() {
      return { max: 48, min: 18, step: 1, lineHeight: 1.22 };
    }

    function getActivityConfig() {
      return { max: 40, min: 16, step: 1, lineHeight: 1.38 };
    }

    function autoFitText(element, options) {
      const { max, min, step, lineHeight } = options;
      element.style.fontSize = `${max}px`;
      element.style.lineHeight = lineHeight;

      while (element.scrollHeight > element.clientHeight + 2 && parseFloat(element.style.fontSize) > min) {
        const current = parseFloat(element.style.fontSize);
        element.style.fontSize = `${current - step}px`;
      }
    }

    function refreshAutoFit() {
      autoFitText(learningQuestion, getQuestionConfig());
      autoFitText(activityInstructions, getActivityConfig());
    }

    function applyPreset(minutes) {
      minutesInput.value = minutes;
      syncTimerFromInput();
      timerStatus.textContent = `Timer preset applied: ${minutes} minute${minutes === 1 ? '' : 's'}.`;
    }

    function handleKeyboardShortcuts(event) {
      const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
      const isTyping = activeTag === 'textarea' || activeTag === 'input';

      if (event.key === ' ' && !isTyping) {
        event.preventDefault();
        if (isRunning) pauseTimer();
        else startTimer();
        return;
      }

      if (isTyping && !event.altKey && !event.ctrlKey && !event.metaKey) return;

      const key = event.key.toLowerCase();
      if (key === 'r') resetTimer();
      if (key === '1') applyPreset(1);
      if (key === '2') applyPreset(2);
      if (key === '5') applyPreset(5);
      if (key === 'f') enterFullScreen();
    }

    minutesInput.addEventListener('input', () => {
      if (!isRunning) syncTimerFromInput();
    });

    learningQuestion.addEventListener('input', () => {
      refreshAutoFit();
      saveState();
    });

    activityInstructions.addEventListener('input', () => {
      refreshAutoFit();
      saveState();
    });

    window.addEventListener('resize', refreshAutoFit);
    window.addEventListener('keydown', handleKeyboardShortcuts);

    presetButtons.forEach(button => {
      button.addEventListener('click', () => {
        applyPreset(parseInt(button.dataset.minutes, 10));
      });
    });

    startTimerButton.addEventListener('click', startTimer);
    pauseTimerButton.addEventListener('click', pauseTimer);
    resetTimerButton.addEventListener('click', resetTimer);
    stopBeepButton.addEventListener('click', () => {
      stopBeeping();
      stopTimerInterval();
      timerStatus.textContent = remainingSeconds === 0 ? 'Alarm stopped.' : 'Timer stopped.';
    });

    loadState();
    updateDateTime();
    setInterval(updateDateTime, 1000);

    updateDisplay();
    updateTimerBar();
    updateLastThirtyWarning();

    requestAnimationFrame(() => {
      refreshAutoFit();
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-GB';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      let activeTarget = null;
      let activeButton = null;

      function startDictation(targetElement, buttonElement) {
        activeTarget = targetElement;
        activeButton = buttonElement;
        targetElement.focus();

        try {
          recognition.start();
        } catch (error) {}
      }

      dictateQuestionButton.addEventListener('click', () => {
        startDictation(learningQuestion, dictateQuestionButton);
      });

      dictateActivityButton.addEventListener('click', () => {
        startDictation(activityInstructions, dictateActivityButton);
      });

      recognition.addEventListener('start', () => {
        dictateQuestionButton.disabled = true;
        dictateActivityButton.disabled = true;

        if (activeButton) {
          activeButton.textContent = 'Listening...';
        }
      });

      recognition.addEventListener('result', (event) => {
        const transcript = event.results[0][0].transcript.trim();

        if (activeTarget) {
          if (activeTarget.value.trim() !== '') {
            activeTarget.value += '\n' + transcript;
          } else {
            activeTarget.value = transcript;
          }
        }

        refreshAutoFit();
        saveState();
      });

      recognition.addEventListener('end', () => {
        dictateQuestionButton.disabled = false;
        dictateActivityButton.disabled = false;
        dictateQuestionButton.textContent = '🎤 Dictate';
        dictateActivityButton.textContent = '🎤 Dictate';
        activeTarget = null;
        activeButton = null;
      });
    } else {
      dictateQuestionButton.disabled = true;
      dictateActivityButton.disabled = true;
    }
  </script>
</body>
</html>
