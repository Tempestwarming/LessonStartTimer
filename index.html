<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do Now App</title>

<style>
:root {
  --panel: #f8f7f1;
  --text: #111;
}

body {
  margin: 0;
  font-family: Arial, Verdana, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg,#d8f3f1,#eadfff,#ffe3f1);
}

/* Top buttons */
.top-toolbar {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
  margin-bottom: 10px;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.primary { background:#54d6e6; }
.secondary { background:#cfeef1; }
.danger { background:#8f1f2d; color:#fff; }

/* Date */
.date-time-bar {
  text-align: center;
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 12px;
}

/* Layout */
.layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
}

.panel {
  background: white;
  padding: 15px;
  border-radius: 18px;
}

/* Text boxes */
textarea {
  width: 100%;
  border-radius: 14px;
  padding: 15px;
  font-size: 2rem;
  resize: none;
  overflow: hidden;
}

/* Timer */
.timer-display {
  font-size: 3rem;
  text-align: center;
}

.warning {
  animation: flash 0.8s infinite;
}

@keyframes flash {
  0% { background:#fff; }
  50% { background:#ffd6d6; }
  100% { background:#fff; }
}
</style>
</head>

<body>

<div>

  <!-- Buttons -->
  <div class="top-toolbar">
    <button class="primary" onclick="enterPresentation()">Presentation</button>
    <button class="secondary" onclick="exitPresentation()">Exit Presentation</button>
    <button class="secondary" onclick="enterFull()">Full Screen</button>
    <button class="danger" onclick="exitFull()">Exit Full</button>
  </div>

  <!-- Date -->
  <div class="date-time-bar" id="dateTimeBar"></div>

  <div class="layout">

    <!-- Left -->
    <div>
      <div class="panel">
        <textarea id="question" placeholder="Learning Question"></textarea>
      </div>

      <div class="panel" style="margin-top:10px;">
        <textarea id="activity" placeholder="Activity Instructions"></textarea>
      </div>
    </div>

    <!-- Timer -->
    <div class="panel">
      <div class="timer-display" id="timer">05:00</div>
      <input type="number" id="minutes" value="5">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
      <button class="danger" onclick="stopBeep()">Stop Beep</button>
    </div>

  </div>

</div>

<script>
/* DATE TIME */
function getOrdinal(n){
  if(n>3&&n<21)return"th";
  switch(n%10){
    case 1:return"st";
    case 2:return"nd";
    case 3:return"rd";
    default:return"th";
  }
}

function updateDate(){
  const now=new Date();
  const day=now.getDate();
  const text=now.toLocaleDateString('en-GB',{weekday:'long'});
  const month=now.toLocaleDateString('en-GB',{month:'long'});
  const year=now.getFullYear();
  const time=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  document.getElementById("dateTimeBar").innerText=
    `${text} the ${day}${getOrdinal(day)} of ${month} ${year} • ${time}`;
}
setInterval(updateDate,1000);
updateDate();

/* TIMER */
let total=300;
let remaining=300;
let running=false;
let interval=null;
let beepInt=null;
let audioCtx;

function updateTimer(){
  let m=Math.floor(remaining/60);
  let s=remaining%60;
  document.getElementById("timer").innerText=
    `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

  if(remaining<=30){
    document.getElementById("timer").classList.add("warning");
  }
}

function startTimer(){
  if(running)return;
  total=document.getElementById("minutes").value*60;
  remaining=total;
  running=true;

  interval=setInterval(()=>{
    remaining--;
    updateTimer();
    if(remaining<=0){
      clearInterval(interval);
      running=false;
      beep();
    }
  },1000);
}

function pauseTimer(){
  clearInterval(interval);
  running=false;
}

function resetTimer(){
  clearInterval(interval);
  running=false;
  remaining=300;
  updateTimer();
}

function beep(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  beepInt=setInterval(()=>{
    let o=audioCtx.createOscillator();
    let g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime+0.2);
  },800);
}

function stopBeep(){
  clearInterval(beepInt);
}

/* FULLSCREEN */
function enterFull(){
  document.documentElement.requestFullscreen();
}
function exitFull(){
  document.exitFullscreen();
}

/* PRESENTATION */
function enterPresentation(){
  document.body.style.background="black";
}
function exitPresentation(){
  document.body.style.background="";
}

/* AUTO TEXT RESIZE */
function autoResize(el){
  el.style.fontSize="2rem";
  while(el.scrollHeight>el.clientHeight){
    let size=parseFloat(window.getComputedStyle(el).fontSize);
    el.style.fontSize=(size-1)+"px";
  }
}

document.getElementById("question").addEventListener("input",e=>autoResize(e.target));
document.getElementById("activity").addEventListener("input",e=>autoResize(e.target));

updateTimer();
</script>

</body>
</html>
