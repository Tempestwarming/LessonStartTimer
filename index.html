<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classroom Do Now App</title>
  <style>
    :root {
      --panel: #f8f7f1;
      --text: #111111;
      --muted: #3d4b4a;
      --border-dark: rgba(0, 0, 0, 0.14);
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.16);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Verdana, "Trebuchet MS", sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(91, 211, 219, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(39, 142, 214, 0.14), transparent 35%),
        linear-gradient(135deg, #d8f3f1 0%, #e7f7ff 38%, #eadfff 68%, #ffe3f1 100%);
    }

    /* Animated outer background */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -18%;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: screen;
    }

    body::before {
      background:
        radial-gradient(circle at 16% 24%, rgba(88, 224, 215, 0.44) 0%, rgba(88, 224, 215, 0.18) 12%, transparent 28%),
        radial-gradient(circle at 76% 26%, rgba(84, 196, 255, 0.38) 0%, rgba(84, 196, 255, 0.14) 14%, transparent 30%),
        radial-gradient(circle at 48% 76%, rgba(183, 143, 255, 0.34) 0%, rgba(183, 143, 255, 0.12) 14%, transparent 30%),
        radial-gradient(circle at 82% 72%, rgba(255, 148, 207, 0.28) 0%, rgba(255, 148, 207, 0.10) 12%, transparent 26%);
      animation: rippleDriftOne 9s ease-in-out infinite alternate;
      filter: blur(26px);
      opacity: 0.9;
    }

    body::after {
      background:
        radial-gradient(circle at 24% 72%, rgba(92, 231, 215, 0.28) 0%, rgba(92, 231, 215, 0.10) 12%, transparent 26%),
        radial-gradient(circle at 68% 16%, rgba(170, 139, 255, 0.26) 0%, rgba(170, 139, 255, 0.10) 12%, transparent 26%),
        radial-gradient(circle at 58% 58%, rgba(255, 171, 220, 0.24) 0%, rgba(255, 171, 220, 0.08) 12%, transparent 24%),
        radial-gradient(circle at 90% 44%, rgba(82, 180, 255, 0.24) 0%, rgba(82, 180, 255, 0.08) 12%, transparent 24%);
      animation: rippleDriftTwo 11s ease-in-out infinite alternate;
      filter: blur(42px);
      opacity: 0.8;
    }

    .app-shell {
      width: min(1320px, 100%);
      border-radius: 30px;
      padding: 4px;
      background: linear-gradient(
        120deg,
        #36c7d8,
        #56e0d0,
        #4ca9ff,
        #8f8dff,
        #ff9bd1,
        #54d6e6,
        #36c7d8
      );
      background-size: 400% 400%;
      animation: shimmerFlow 7s linear infinite;
      box-shadow: 0 24px 60px rgba(14, 84, 110, 0.22);
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 18%,
        rgba(255, 255, 255, 0.40) 34%,
        transparent 50%
      );
      transform: translateX(-120%);
      animation: shimmerSweep 4.2s ease-in-out infinite;
      pointer-events: none;
    }

    .app-frame {
      position: relative;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(6px);
      border-radius: 26px;
      padding: 30px;
      min-height: 700px;
    }

    .top-toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .header {
      margin-bottom: 24px;
    }

    .title {
      margin: 0;
      font-size: clamp(1.9rem, 2.6vw, 2.8rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 1.02rem;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 2.1fr 1fr;
      gap: 26px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 1.24rem;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      border: 2px solid rgba(0, 0, 0, 0.16);
      border-radius: 16px;
      background: var(--panel);
      color: var(--text);
      padding: 16px 18px;
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      border-color: #2aa7d7;
      box-shadow: 0 0 0 4px rgba(42, 167, 215, 0.16);
    }

    textarea {
      resize: vertical;
      min-height: 280px;
      line-height: 1.5;
    }

    .question-row,
    .activity-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
    }

    .button,
    .timer-button {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #54d6e6, #2f9fd2);
      color: #0c1b21;
      box-shadow: 0 10px 24px rgba(41, 137, 175, 0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
    }

    .button:hover,
    .timer-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(41, 137, 175, 0.34);
      filter: brightness(1.03);
    }

    .button:active,
    .timer-button:active {
      transform: translateY(0);
    }

    .button[disabled] {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .secondary {
      background: linear-gradient(135deg, #cfeef1, #9edbe8);
    }

    .danger {
      background: linear-gradient(135deg, #ffe0d7, #ffbba6);
    }

    .presentation-exit {
      background: linear-gradient(135deg, #f7d9ff, #c5b7ff);
    }

    .helper-text {
      margin-top: 8px;
      font-size: 0.94rem;
      color: var(--muted);
      min-height: 1.2em;
    }

    .timer-card {
      display: grid;
      gap: 18px;
    }

    .timer-visual-layout {
      display: grid;
      grid-template-columns: 1fr 48px;
      gap: 16px;
      align-items: stretch;
    }

    .timer-display-wrap {
      background: var(--panel);
      border: 2px solid rgba(0, 0, 0, 0.14);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .timer-display-wrap.warning-flash {
      animation: lastThirtyFlash 0.85s ease-in-out infinite;
    }

    .timer-label {
      font-size: 0.98rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .timer-display {
      font-size: clamp(2.8rem, 7vw, 4.9rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .timer-bar-outer {
      position: relative;
      border-radius: 22px;
      border: 2px solid rgba(0, 0, 0, 0.14);
      background: rgba(248, 247, 241, 0.9);
      overflow: hidden;
      min-height: 180px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    .timer-bar-fill {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 100%;
      background: linear-gradient(
        180deg,
        #79e5d9 0%,
        #58d2df 35%,
        #39b8df 65%,
        #2b98d4 100%
      );
      transition: height 0.35s linear;
    }

    .timer-bar-fill.warning {
      background: linear-gradient(
        180deg,
        #ffe38a 0%,
        #ffc85a 50%,
        #ff9f43 100%
      );
    }

    .timer-bar-fill.danger {
      background: linear-gradient(
        180deg,
        #ffb3a8 0%,
        #ff7d73 55%,
        #f04f4f 100%
      );
    }

    .timer-bar-glass {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0.24) 0%,
        rgba(255, 255, 255, 0.08) 25%,
        rgba(255, 255, 255, 0.02) 55%,
        rgba(0, 0, 0, 0.04) 100%
      );
      pointer-events: none;
    }

    .timer-controls {
      display: grid;
      gap: 12px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status-box {
      background: rgba(248, 247, 241, 0.95);
      border: 2px dashed rgba(0, 0, 0, 0.15);
      border-radius: 18px;
      padding: 14px;
      min-height: 74px;
      line-height: 1.4;
    }

    .flash {
      animation: pulseAlert 0.9s ease-in-out 3;
    }

    /* Bigger classroom text */
    #learningQuestion {
      font-size: 2.45rem;
      font-weight: 700;
      line-height: 1.3;
      min-height: 92px;
    }

    #activityInstructions {
      font-size: 2.3rem;
      line-height: 1.55;
      min-height: 320px;
    }

    #learningQuestion::placeholder,
    #activityInstructions::placeholder {
      font-size: 1.55rem;
    }

    body.presentation-mode {
      padding: 10px;
    }

    body.presentation-mode .app-shell {
      width: 100%;
      max-width: none;
    }

    body.presentation-mode .app-frame {
      min-height: calc(100vh - 20px);
      padding: 22px;
    }

    body.presentation-mode .header {
      margin-bottom: 16px;
    }

    body.presentation-mode .title {
      font-size: clamp(2.5rem, 4vw, 4.1rem);
    }

    body.presentation-mode .subtitle {
      font-size: 1.22rem;
    }

    body.presentation-mode .layout {
      grid-template-columns: 2.5fr 1fr;
      gap: 22px;
      min-height: calc(100vh - 180px);
    }

    body.presentation-mode .panel {
      padding: 24px;
    }

    body.presentation-mode .setup-controls,
    body.presentation-mode .field label,
    body.presentation-mode .helper-text,
    body.presentation-mode .timer-controls {
      display: none;
    }

    body.presentation-mode .panel h2 {
      font-size: 1.65rem;
      margin-bottom: 12px;
    }

    body.presentation-mode #learningQuestion {
      font-size: clamp(3rem, 4.6vw, 4.4rem);
      min-height: 120px;
      padding: 24px 26px;
    }

    body.presentation-mode #activityInstructions {
      font-size: clamp(2.45rem, 3.4vw, 3.4rem);
      line-height: 1.5;
      min-height: 460px;
      padding: 26px;
    }

    body.presentation-mode #learningQuestion::placeholder,
    body.presentation-mode #activityInstructions::placeholder {
      font-size: inherit;
    }

    body.presentation-mode .timer-visual-layout {
      grid-template-columns: 1fr 70px;
      gap: 18px;
    }

    body.presentation-mode .timer-display-wrap {
      padding: 28px 20px;
    }

    body.presentation-mode .timer-label {
      font-size: 1.24rem;
    }

    body.presentation-mode .timer-display {
      font-size: clamp(4.2rem, 9vw, 7.2rem);
    }

    body.presentation-mode .timer-bar-outer {
      min-height: 300px;
    }

    body.presentation-mode .status-box {
      font-size: 1.22rem;
      min-height: 90px;
    }

    @keyframes shimmerFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shimmerSweep {
      0% { transform: translateX(-120%); }
      55% { transform: translateX(120%); }
      100% { transform: translateX(120%); }
    }

    @keyframes rippleDriftOne {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      25% {
        transform: translate3d(3%, -2%, 0) scale(1.06);
      }
      50% {
        transform: translate3d(-2%, 3%, 0) scale(1.1);
      }
      75% {
        transform: translate3d(2%, 2%, 0) scale(1.05);
      }
      100% {
        transform: translate3d(-3%, -2%, 0) scale(1.08);
      }
    }

    @keyframes rippleDriftTwo {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      25% {
        transform: translate3d(-3%, 2%, 0) scale(1.08);
      }
      50% {
        transform: translate3d(2%, -3%, 0) scale(1.12);
      }
      75% {
        transform: translate3d(-2%, -1%, 0) scale(1.06);
      }
      100% {
        transform: translate3d(3%, 2%, 0) scale(1.1);
      }
    }

    @keyframes pulseAlert {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    @keyframes lastThirtyFlash {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 128, 128, 0.00);
        background: rgba(248, 247, 241, 1);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(255, 128, 128, 0.16);
        background: rgba(255, 239, 239, 1);
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .app-frame {
        padding: 20px;
      }

      .question-row,
      .activity-row {
        grid-template-columns: 1fr;
      }

      .timer-visual-layout {
        grid-template-columns: 1fr 36px;
      }

      #learningQuestion {
        font-size: 1.8rem;
      }

      #activityInstructions {
        font-size: 1.7rem;
      }

      body.presentation-mode .layout {
        grid-template-columns: 1fr;
      }

      body.presentation-mode #activityInstructions {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="app-frame">
      <div class="top-toolbar setup-controls">
        <button class="button" id="presentationToggle" type="button">Presentation Mode</button>
        <button class="button presentation-exit" id="exitPresentationButton" type="button">Exit Presentation</button>
        <button class="button secondary" id="fullscreenToggle" type="button">Enter Full Screen</button>
        <button class="button danger" id="exitFullscreenButton" type="button">Exit Full Screen</button>
      </div>

      <header class="header">
        <h1 class="title">Classroom Do Now</h1>
        <p class="subtitle">Set the learning question, add the task, and run a visible classroom timer.</p>
      </header>

      <main class="layout">
        <section class="panel">
          <h2>Lesson Setup</h2>

          <div class="field">
            <label for="learningQuestion">Learning Question</label>
            <div class="question-row">
              <input
                type="text"
                id="learningQuestion"
                placeholder="Type the learning question here"
                aria-label="Learning question"
              />
              <button class="button" id="dictateQuestionButton" type="button">🎤 Dictate</button>
            </div>
            <div class="helper-text" id="speechStatus">Speech input ready.</div>
          </div>

          <div class="field">
            <label for="activityInstructions">Activity Instructions</label>
            <div class="activity-row">
              <textarea
                id="activityInstructions"
                placeholder="Type the do now task or activity instructions here"
                aria-label="Activity instructions"
              ></textarea>
              <button class="button" id="dictateActivityButton" type="button">🎤 Dictate</button>
            </div>
          </div>
        </section>

        <aside class="panel timer-card">
          <h2>Timer</h2>

          <div class="timer-visual-layout">
            <div class="timer-display-wrap" id="timerDisplayWrap">
              <div class="timer-label">Time Remaining</div>
              <div class="timer-display" id="timerDisplay">05:00</div>
            </div>

            <div class="timer-bar-outer" aria-hidden="true">
              <div class="timer-bar-fill" id="timerBarFill"></div>
              <div class="timer-bar-glass"></div>
            </div>
          </div>

          <div class="timer-controls">
            <div class="field">
              <label for="minutesInput">Minutes</label>
              <input
                type="number"
                id="minutesInput"
                min="1"
                max="120"
                value="5"
                aria-label="Timer minutes"
              />
            </div>

            <div class="button-row">
              <button class="timer-button" id="startTimer" type="button">Start</button>
              <button class="timer-button secondary" id="pauseTimer" type="button">Pause</button>
            </div>

            <div class="button-row">
              <button class="timer-button secondary" id="resetTimer" type="button">Reset</button>
              <button class="timer-button danger" id="stopBeep" type="button">Stop Beep</button>
            </div>
          </div>

          <div class="status-box" id="timerStatus">
            Timer is ready. Set the minutes and press start.
          </div>
        </aside>
      </main>
    </div>
  </div>

  <script>
    const learningQuestion = document.getElementById('learningQuestion');
    const activityInstructions = document.getElementById('activityInstructions');

    const dictateQuestionButton = document.getElementById('dictateQuestionButton');
    const dictateActivityButton = document.getElementById('dictateActivityButton');
    const speechStatus = document.getElementById('speechStatus');

    const minutesInput = document.getElementById('minutesInput');
    const timerDisplay = document.getElementById('timerDisplay');
    const timerDisplayWrap = document.getElementById('timerDisplayWrap');
    const timerStatus = document.getElementById('timerStatus');
    const timerBarFill = document.getElementById('timerBarFill');

    const startTimerButton = document.getElementById('startTimer');
    const pauseTimerButton = document.getElementById('pauseTimer');
    const resetTimerButton = document.getElementById('resetTimer');
    const stopBeepButton = document.getElementById('stopBeep');

    const presentationToggle = document.getElementById('presentationToggle');
    const exitPresentationButton = document.getElementById('exitPresentationButton');
    const fullscreenToggle = document.getElementById('fullscreenToggle');
    const exitFullscreenButton = document.getElementById('exitFullscreenButton');

    let totalSeconds = parseInt(minutesInput.value, 10) * 60;
    let remainingSeconds = totalSeconds;
    let timerInterval = null;
    let isRunning = false;
    let audioContext = null;
    let beepInterval = null;

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function updateDisplay() {
      timerDisplay.textContent = formatTime(remainingSeconds);
    }

    function updateTimerBar() {
      const ratio = totalSeconds > 0 ? remainingSeconds / totalSeconds : 0;
      const percentage = Math.max(0, Math.min(100, ratio * 100));
      timerBarFill.style.height = `${percentage}%`;

      timerBarFill.classList.remove('warning', 'danger');
      if (percentage <= 25) {
        timerBarFill.classList.add('danger');
      } else if (percentage <= 50) {
        timerBarFill.classList.add('warning');
      }
    }

    function updateLastThirtyWarning() {
      if (isRunning && remainingSeconds <= 30 && remainingSeconds > 0) {
        timerDisplayWrap.classList.add('warning-flash');
      } else {
        timerDisplayWrap.classList.remove('warning-flash');
      }
    }

    function syncTimerFromInput() {
      const minutes = Math.max(1, Math.min(120, parseInt(minutesInput.value, 10) || 5));
      minutesInput.value = minutes;
      totalSeconds = minutes * 60;
      remainingSeconds = totalSeconds;
      updateDisplay();
      updateTimerBar();
      updateLastThirtyWarning();
      timerStatus.textContent = `Timer set for ${minutes} minute${minutes === 1 ? '' : 's'}.`;
      timerDisplayWrap.classList.remove('flash');
    }

    function stopTimerInterval() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      isRunning = false;
      updateLastThirtyWarning();
    }

    function startTimer() {
      if (isRunning) return;

      if (remainingSeconds <= 0) {
        syncTimerFromInput();
      }

      stopBeeping();
      isRunning = true;
      timerStatus.textContent = 'Timer is running.';
      updateLastThirtyWarning();

      timerInterval = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds -= 1;
          updateDisplay();
          updateTimerBar();
          updateLastThirtyWarning();
        }

        if (remainingSeconds <= 0) {
          stopTimerInterval();
          timerStatus.textContent = 'Time is up.';
          timerDisplayWrap.classList.add('flash');
          updateTimerBar();
          updateLastThirtyWarning();
          startBeeping();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      stopTimerInterval();
      timerStatus.textContent = 'Timer paused.';
    }

    function resetTimer() {
      stopTimerInterval();
      stopBeeping();
      syncTimerFromInput();
      timerStatus.textContent = 'Timer reset.';
    }

    function createBeep() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = 'sine';
      oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
      gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.2, audioContext.currentTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.28);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      oscillator.start();
      oscillator.stop(audioContext.currentTime + 0.3);
    }

    function startBeeping() {
      stopBeeping();
      createBeep();
      beepInterval = setInterval(createBeep, 900);
    }

    function stopBeeping() {
      if (beepInterval) {
        clearInterval(beepInterval);
        beepInterval = null;
      }
    }

    function enterPresentationMode() {
      document.body.classList.add('presentation-mode');
      updatePresentationButtons();
    }

    function exitPresentationMode() {
      document.body.classList.remove('presentation-mode');
      updatePresentationButtons();
    }

    function updatePresentationButtons() {
      const inPresentation = document.body.classList.contains('presentation-mode');
      presentationToggle.disabled = inPresentation;
      presentationToggle.textContent = inPresentation ? 'Presentation Active' : 'Presentation Mode';
      exitPresentationButton.disabled = !inPresentation;
    }

    async function enterFullScreen() {
      if (!document.fullscreenElement) {
        try {
          await document.documentElement.requestFullscreen();
        } catch (error) {
          timerStatus.textContent = 'Full screen was blocked by the browser.';
        }
      }
    }

    async function exitFullScreen() {
      if (document.fullscreenElement) {
        try {
          await document.exitFullscreen();
        } catch (error) {
          timerStatus.textContent = 'Unable to exit full screen.';
        }
      }
    }

    function updateFullscreenButtons() {
      const inFullscreen = !!document.fullscreenElement;
      fullscreenToggle.textContent = inFullscreen ? 'Full Screen Active' : 'Enter Full Screen';
      fullscreenToggle.disabled = inFullscreen;
    }

    minutesInput.addEventListener('input', () => {
      if (!isRunning) {
        syncTimerFromInput();
      }
    });

    startTimerButton.addEventListener('click', startTimer);
    pauseTimerButton.addEventListener('click', pauseTimer);
    resetTimerButton.addEventListener('click', resetTimer);
    stopBeepButton.addEventListener('click', () => {
      stopBeeping();
      timerStatus.textContent = remainingSeconds === 0 ? 'Beep stopped. Time has ended.' : 'Beep stopped.';
    });

    presentationToggle.addEventListener('click', enterPresentationMode);
    exitPresentationButton.addEventListener('click', exitPresentationMode);

    fullscreenToggle.addEventListener('click', enterFullScreen);
    exitFullscreenButton.addEventListener('click', exitFullScreen);

    document.addEventListener('fullscreenchange', updateFullscreenButtons);

    updateDisplay();
    updateTimerBar();
    updateLastThirtyWarning();
    updatePresentationButtons();
    updateFullscreenButtons();

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-GB';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      let activeTarget = null;
      let activeButton = null;
      let activeLabel = '';

      function startDictation(targetElement, buttonElement, labelText) {
        activeTarget = targetElement;
        activeButton = buttonElement;
        activeLabel = labelText;

        try {
          recognition.start();
        } catch (error) {
          speechStatus.textContent = 'Speech input is already active.';
        }
      }

      dictateQuestionButton.addEventListener('click', () => {
        startDictation(learningQuestion, dictateQuestionButton, 'learning question');
      });

      dictateActivityButton.addEventListener('click', () => {
        startDictation(activityInstructions, dictateActivityButton, 'activity instructions');
      });

      recognition.addEventListener('start', () => {
        speechStatus.textContent = `Listening for ${activeLabel}...`;
        dictateQuestionButton.disabled = true;
        dictateActivityButton.disabled = true;

        if (activeButton) {
          activeButton.textContent = 'Listening...';
        }
      });

      recognition.addEventListener('result', (event) => {
        const transcript = event.results[0][0].transcript.trim();

        if (activeTarget) {
          if (activeTarget.tagName.toLowerCase() === 'textarea' && activeTarget.value.trim() !== '') {
            activeTarget.value += '\n' + transcript;
          } else {
            activeTarget.value = transcript;
          }
        }

        speechStatus.textContent = `${activeLabel.charAt(0).toUpperCase() + activeLabel.slice(1)} captured.`;
      });

      recognition.addEventListener('error', (event) => {
        speechStatus.textContent = `Speech input error: ${event.error}.`;
      });

      recognition.addEventListener('end', () => {
        dictateQuestionButton.disabled = false;
        dictateActivityButton.disabled = false;
        dictateQuestionButton.textContent = '🎤 Dictate';
        dictateActivityButton.textContent = '🎤 Dictate';
        activeTarget = null;
        activeButton = null;
        activeLabel = '';
      });
    } else {
      dictateQuestionButton.disabled = true;
      dictateActivityButton.disabled = true;
      speechStatus.textContent = 'Speech input is not supported in this browser.';
    }
  </script>
</body>
</html>
